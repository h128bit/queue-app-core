stages:
  - build
  - deploy

build_docs:
  stage: build
  image: python:3.11
  script:
    - python -m pip install --upgrade pip
    - pip install sphinx furo 
    - pip install -e .
    - sphinx-build -b html docs/source public
  artifacts:
    paths:
      - public

pages:
  stage: deploy
  script:
    - echo "Deploying documentation to GitLab Pages"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH